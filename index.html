<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="height=device-height, width=device-width, initial-scale=1.0" />
  <meta name="description" content="Image pull statistics of l7mp.io container images." />
  <title>Image pull statistics</title>
  <script src="https://cdn.plot.ly/plotly-3.5.0.min.js" charset="utf-8"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.5.3/papaparse.min.js"></script>
  <script>
    const csv_path = 'https://raw.githubusercontent.com/l7mp/image-pull-stats/refs/heads/main/pull-stats.csv';
    const config = {
      responsive: true,
      displaylogo: false
    };
    const colors = {
      stunnerd: 'rgb(66,133,244)',
      stunnerGatewayOperator: 'rgb(234,67,53)',
      stunnerAuthServer: 'rgb(255,188,5)',
      netDebug: 'rgb(52,168,83)',
      icetester: 'rgb(168,168,168)',
    };

    const visibleRepos = [
      { csvKey: 'stunnerd', label: 'l7mp/stunnerd', colorKey: 'stunnerd' },
      { csvKey: 'stunner-gateway-operator', label: 'l7mp/stunner-gateway-operator', colorKey: 'stunnerGatewayOperator' },
      { csvKey: 'stunner-auth-server', label: 'l7mp/stunner-auth-server', colorKey: 'stunnerAuthServer' },
      { csvKey: 'net-debug', label: 'l7mp/net-debug', colorKey: 'netDebug' },
      { csvKey: 'icetester', label: 'l7mp/icetester', colorKey: 'icetester' },
    ];

    function showError(message) {
      const errorElement = document.getElementById('error');
      errorElement.textContent = message;
      errorElement.style.display = 'block';
      document.getElementById('daily').style.display = 'none';
      document.getElementById('total').style.display = 'none';
    }

    function parseSeries(rows, key) {
      return rows.map(row => {
        const value = Number(row[key]);
        return Number.isFinite(value) ? value : null;
      });
    }

    function getDifferences(values) {
      return values.slice(1).map((value, index) => {
        const previous = values[index];
        if (value === null || previous === null) {
          return null;
        }
        return value - previous;
      });
    }

    function buildDailyTrace(rows, dailyX, repo) {
      const series = parseSeries(rows, repo.csvKey);
      return {
        x: dailyX,
        y: getDifferences(series),
        type: 'bar',
        name: repo.label,
        marker: {
          color: colors[repo.colorKey],
          size: 10
        },
        line: {
          color: colors[repo.colorKey],
          width: 2
        }
      };
    }

    function buildTotalTrace(rows, totalX, repo) {
      return {
        x: totalX,
        y: parseSeries(rows, repo.csvKey),
        type: 'lines+markers',
        name: repo.label,
        marker: {
          color: colors[repo.colorKey],
          size: 10
        },
        line: {
          color: colors[repo.colorKey],
          width: 2
        }
      };
    }

    Papa.parse(csv_path, {
      download: true,
      header: true,
      complete: function(csv_data) {
        if (csv_data.errors.length > 0) {
          showError('Unable to parse CSV data.');
          return;
        }

        const rows = csv_data.data.filter(row => row.date && row.date.trim() !== '');
        if (rows.length < 2) {
          showError('Not enough data points to render charts yet.');
          return;
        }

        const totalX = rows.map(row => row.date + 'T12:00');
        const dailyX = totalX.slice(1);

        const dailyTraces = visibleRepos.map(repo => buildDailyTrace(rows, dailyX, repo));
        const dailyLayout = {
          title: 'Image Pulls (Daily)',
        };

        Plotly.newPlot('daily',
          dailyTraces,
          dailyLayout, config
        );

        const totalTraces = visibleRepos.map(repo => buildTotalTrace(rows, totalX, repo));
        const totalLayout = {
          title: 'Image Pulls (Total)',
          autosize: true
        };

        Plotly.newPlot('total',
          totalTraces,
          totalLayout, config
        );
      },
      error: function() {
        showError('Unable to download CSV data from GitHub.');
      }
    });


    function showPlot(evt, element) {
      // Declare all variables
      var i, tabcontent, tablinks;

      // Get all elements with class="tabcontent" and hide them
      tabcontent = document.getElementsByClassName("tabcontent");
      for(i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
      }

      // Get all elements with class="tablinks" and remove the class "active"
      tablinks = document.getElementsByClassName("tablinks");
      for(i = 0; i < tablinks.length; i++) {
        tablinks[i].className = tablinks[i].className.replace(" active", "");
      }

      // Show the current tab, and add an "active" class to the button that opened the tab
      document.getElementById(element).style.display = "block";
      evt.currentTarget.className += " active";

      window.dispatchEvent(new Event('resize'));
    }
  </script>
  <style>
        #total {
            display: none;
	    width: 99vw;
	    height: 80vh;
        }
	#daily {
            display: block;
	    width: 99vw;
	    height: 80vh;
        }
	.tablinks{
	    background-color: rgba(51, 51, 51, 0.05);
	    border-radius: 8px;
	    border-width: 0;
	    color: #333333;
	    cursor: pointer;
	    display: inline-block;
	    font-size: 14px;
	    font-weight: 500;
	    line-height: 20px;
	    list-style: none;
	    margin: 0;
	    padding: 10px 15px;
	    text-align: center;
	    vertical-align: baseline;
	    white-space: nowrap;
	    user-select: none;
	    -webkit-user-select: none;
	    touch-action: manipulation;
	}
  #error {
      display: none;
      margin-top: 12px;
      color: #a31b1b;
      font-weight: 600;
  }
  </style>
</head>
<body>
  <h2>Image pull statistics</h2>

  <div class="tab">
    <button id="dailyButton" class="tablinks" onclick="showPlot(event, 'daily')">Daily</button>
    <button id="totalButton" class="tablinks" onclick="showPlot(event, 'total')">Total</button>
  </div>

  <div id="daily" class="tabcontent"></div>
  <div id="total" class="tabcontent"></div>
  <div id="error"></div>

  <div>More info: <a href="https://github.com/l7mp/image-pull-stats">github</a></div>

  <script>
    document.getElementById("dailyButton").click();
  </script>

</body>
</html>
